<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORYN — Deposit into Vault</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 24px auto; padding: 0 16px; color: #111; }
  h1 { font-size: clamp(18px, 5vw, 20px); }
  .row { margin: 16px 0; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  input {
    width: 100%; padding: 12px; font-size: 16px; border-radius: 8px;
    border: 1px solid #ccc; min-height: 44px;
  }
  code, pre {
    background: #f4f4f4; padding: 8px; border-radius: 6px; display: block;
    overflow-x: auto; font-size: 12px; word-break: break-all; white-space: pre-wrap;
  }
  button {
    width: 100%; padding: 14px 16px; font-size: 15px; border-radius: 8px;
    border: 1px solid #333; background: #111; color: #fff; cursor: pointer;
    margin-top: 10px; min-height: 44px;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { margin-top: 16px; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .ok { color: #087f23; }
  .err { color: #b00020; }
  .step { margin-top: 4px; font-size: 13px; color: #555; }
  @media (min-width: 480px) {
    body { margin: 40px auto; }
    button { width: auto; margin-right: 8px; }
  }
</style>
</head>
<body>
  <h1>ORYN — Deposit into Vault</h1>
  <p>This pays into an ORYN vault: <strong>approve</strong> the vault to pull the token, then <strong>deposit</strong>. Two transactions, both shown before you confirm.</p>

  <div class="row">
    <label>Vault address</label>
    <input id="vaultInput" value="0xc3c92EA811e5fF318E0D12384CdeD13BD3aEee0E" />
  </div>
  <div class="row">
    <label>Token address (cUSD / USDm, 18 decimals)</label>
    <input id="tokenInput" value="0x765DE816845861e75A25fCA122bb6898B8B1282a" />
  </div>
  <div class="row">
    <label>Amount (in token units, e.g. 1.00)</label>
    <input id="amountInput" value="1.00" />
  </div>

  <button id="connectBtn">1. Connect Wallet</button>
  <button id="approveBtn" disabled>2. Approve</button>
  <button id="depositBtn" disabled>3. Deposit</button>

  <div id="status"></div>

  <script>
    const CELO_CHAIN_ID_HEX = "0xa4ec"; // 42220
    const SELECTOR_APPROVE = "095ea7b3";
    const SELECTOR_DEPOSIT = "b6b55f25";
    const SELECTOR_ALLOWANCE = "dd62ed3e";

    const statusEl = document.getElementById("status");
    const connectBtn = document.getElementById("connectBtn");
    const approveBtn = document.getElementById("approveBtn");
    const depositBtn = document.getElementById("depositBtn");
    const vaultInput = document.getElementById("vaultInput");
    const tokenInput = document.getElementById("tokenInput");
    const amountInput = document.getElementById("amountInput");

    let account = null;

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = cls || "";
    }

    function padHex(hex, bytes) {
      return hex.replace(/^0x/, "").padStart(bytes * 2, "0");
    }

    function encodeAddress(addr) {
      return padHex(addr, 32);
    }

    function encodeUint256(bigintValue) {
      return padHex(bigintValue.toString(16), 32);
    }

    // Parses a decimal string like "1.5" into a base-unit BigInt at `decimals` precision,
    // without floating point (avoids precision bugs on real money amounts).
    function parseUnitsDecimal(value, decimals) {
      const [whole, frac = ""] = value.trim().split(".");
      const fracPadded = (frac + "0".repeat(decimals)).slice(0, decimals);
      const wholeDigits = whole === "" ? "0" : whole;
      return BigInt(wholeDigits + fracPadded);
    }

    connectBtn.addEventListener("click", async () => {
      if (!window.ethereum) {
        setStatus("No wallet found. Install MetaMask (or open this page in a wallet browser) and reload.", "err");
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0];

        const chainId = await window.ethereum.request({ method: "eth_chainId" });
        if (chainId !== CELO_CHAIN_ID_HEX) {
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: CELO_CHAIN_ID_HEX }],
            });
          } catch (switchErr) {
            if (switchErr.code === 4902) {
              await window.ethereum.request({
                method: "wallet_addEthereumChain",
                params: [{
                  chainId: CELO_CHAIN_ID_HEX,
                  chainName: "Celo Mainnet",
                  nativeCurrency: { name: "CELO", symbol: "CELO", decimals: 18 },
                  rpcUrls: ["https://forno.celo.org"],
                  blockExplorerUrls: ["https://celoscan.io"],
                }],
              });
            } else {
              throw switchErr;
            }
          }
        }

        setStatus("Connected: " + account, "ok");
        approveBtn.disabled = false;
        depositBtn.disabled = false;
      } catch (err) {
        setStatus("Connect failed: " + (err && err.message ? err.message : err), "err");
      }
    });

    approveBtn.addEventListener("click", async () => {
      if (!account) return;
      try {
        const amount = parseUnitsDecimal(amountInput.value, 18);
        const data = "0x" + SELECTOR_APPROVE + encodeAddress(vaultInput.value) + encodeUint256(amount);
        setStatus("Sending approve() — check your wallet...");
        const txHash = await window.ethereum.request({
          method: "eth_sendTransaction",
          params: [{ from: account, to: tokenInput.value, data, value: "0x0" }],
        });
        setStatus("Approved. Tx: " + txHash + "\nView: https://celoscan.io/tx/" + txHash + "\n\nNow click Deposit.", "ok");
      } catch (err) {
        setStatus("Approve failed or was rejected: " + (err && err.message ? err.message : err), "err");
      }
    });

    depositBtn.addEventListener("click", async () => {
      if (!account) return;
      try {
        const amount = parseUnitsDecimal(amountInput.value, 18);
        const data = "0x" + SELECTOR_DEPOSIT + encodeUint256(amount);
        setStatus("Sending deposit() — check your wallet...");
        const txHash = await window.ethereum.request({
          method: "eth_sendTransaction",
          params: [{ from: account, to: vaultInput.value, data, value: "0x0" }],
        });
        setStatus(
          "Deposited! Tx: " + txHash +
          "\nView: https://celoscan.io/tx/" + txHash +
          "\n\nORYN's agent should detect this within ~15s and execute the split automatically.",
          "ok",
        );
      } catch (err) {
        setStatus("Deposit failed or was rejected: " + (err && err.message ? err.message : err), "err");
      }
    });
  </script>
</body>
</html>
