<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORYN — Fund Agent Wallet</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 24px auto; padding: 0 16px; color: #111; }
  h1 { font-size: clamp(18px, 5vw, 20px); }
  .row { margin: 16px 0; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  input {
    width: 100%; padding: 12px; font-size: 16px; border-radius: 8px;
    border: 1px solid #ccc; min-height: 44px;
  }
  code, pre {
    background: #f4f4f4; padding: 8px; border-radius: 6px; display: block;
    overflow-x: auto; font-size: 12px; word-break: break-all; white-space: pre-wrap;
  }
  button {
    width: 100%; padding: 14px 16px; font-size: 15px; border-radius: 8px;
    border: 1px solid #333; background: #111; color: #fff; cursor: pointer;
    margin-top: 10px; min-height: 44px;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { margin-top: 16px; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .ok { color: #087f23; }
  .err { color: #b00020; }
  @media (min-width: 480px) {
    body { margin: 40px auto; }
    button { width: auto; margin-right: 8px; }
  }
</style>
</head>
<body>
  <h1>ORYN — Fund Agent Wallet (USDC)</h1>
  <p>Sends USDC to ORYN's agent wallet so it can pay for its own x402 categorization calls ($0.001 each — this covers thousands of them). The agent wallet can never withdraw from your vault; this is a separate, one-time top-up of its own operating balance.</p>

  <div class="row">
    <label>Agent wallet (recipient)</label>
    <input id="agentInput" value="0xeae6959bE76b5f2ad2142A6fe5E4Cf4F9Ca45d26" />
  </div>
  <div class="row">
    <label>USDC token address</label>
    <input id="tokenInput" value="0xcebA9300f2b948710d2653dD7B07f33A8B32118C" />
  </div>
  <div class="row">
    <label>Amount (USDC, e.g. 1.00)</label>
    <input id="amountInput" value="1.00" />
  </div>

  <button id="connectBtn">1. Connect Wallet</button>
  <button id="sendBtn" disabled>2. Send USDC</button>

  <div id="status"></div>

  <script>
    const CELO_CHAIN_ID_HEX = "0xa4ec"; // 42220
    const SELECTOR_TRANSFER = "a9059cbb";
    const USDC_DECIMALS = 6;

    const statusEl = document.getElementById("status");
    const connectBtn = document.getElementById("connectBtn");
    const sendBtn = document.getElementById("sendBtn");
    const agentInput = document.getElementById("agentInput");
    const tokenInput = document.getElementById("tokenInput");
    const amountInput = document.getElementById("amountInput");

    let account = null;

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = cls || "";
    }

    function padHex(hex, bytes) {
      return hex.replace(/^0x/, "").padStart(bytes * 2, "0");
    }

    function encodeAddress(addr) {
      return padHex(addr, 32);
    }

    function encodeUint256(bigintValue) {
      return padHex(bigintValue.toString(16), 32);
    }

    function parseUnitsDecimal(value, decimals) {
      const [whole, frac = ""] = value.trim().split(".");
      const fracPadded = (frac + "0".repeat(decimals)).slice(0, decimals);
      const wholeDigits = whole === "" ? "0" : whole;
      return BigInt(wholeDigits + fracPadded);
    }

    connectBtn.addEventListener("click", async () => {
      if (!window.ethereum) {
        setStatus("No wallet found. Install MetaMask (or open this page in a wallet browser) and reload.", "err");
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0];

        const chainId = await window.ethereum.request({ method: "eth_chainId" });
        if (chainId !== CELO_CHAIN_ID_HEX) {
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: CELO_CHAIN_ID_HEX }],
            });
          } catch (switchErr) {
            if (switchErr.code === 4902) {
              await window.ethereum.request({
                method: "wallet_addEthereumChain",
                params: [{
                  chainId: CELO_CHAIN_ID_HEX,
                  chainName: "Celo Mainnet",
                  nativeCurrency: { name: "CELO", symbol: "CELO", decimals: 18 },
                  rpcUrls: ["https://forno.celo.org"],
                  blockExplorerUrls: ["https://celoscan.io"],
                }],
              });
            } else {
              throw switchErr;
            }
          }
        }

        setStatus("Connected: " + account, "ok");
        sendBtn.disabled = false;
      } catch (err) {
        setStatus("Connect failed: " + (err && err.message ? err.message : err), "err");
      }
    });

    sendBtn.addEventListener("click", async () => {
      if (!account) return;
      try {
        const amount = parseUnitsDecimal(amountInput.value, USDC_DECIMALS);
        const data = "0x" + SELECTOR_TRANSFER + encodeAddress(agentInput.value) + encodeUint256(amount);
        setStatus("Sending — check your wallet for the confirmation prompt...");
        const txHash = await window.ethereum.request({
          method: "eth_sendTransaction",
          params: [{ from: account, to: tokenInput.value, data, value: "0x0" }],
        });
        setStatus("Sent! Tx: " + txHash + "\nView: https://celoscan.io/tx/" + txHash, "ok");
      } catch (err) {
        setStatus("Transaction failed or was rejected: " + (err && err.message ? err.message : err), "err");
      }
    });
  </script>
</body>
</html>
