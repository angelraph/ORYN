<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORYN — Withdraw Savings</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 24px auto; padding: 0 16px; color: #111; }
  h1 { font-size: clamp(18px, 5vw, 20px); margin-bottom: 4px; }
  p.sub { color: #555; font-size: 14px; margin-top: 0; }
  .row { margin: 16px 0; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  input {
    width: 100%; padding: 12px; font-size: 16px; border-radius: 8px;
    border: 1px solid #ccc; min-height: 44px;
  }
  code, pre {
    background: #f4f4f4; padding: 8px; border-radius: 6px; display: block;
    overflow-x: auto; font-size: 12px; word-break: break-all; white-space: pre-wrap;
  }
  button {
    width: 100%; padding: 14px 16px; font-size: 15px; border-radius: 8px;
    border: 1px solid #333; background: #111; color: #fff; cursor: pointer;
    margin-top: 10px; min-height: 44px;
  }
  button.secondary { background: #fff; color: #111; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .balance-box { background: #f4f4f4; border-radius: 8px; padding: 12px; margin-top: 8px; font-size: 14px; }
  .balance-box strong { font-size: 18px; display: block; margin-top: 2px; }
  #status { margin-top: 16px; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .ok { color: #087f23; }
  .err { color: #b00020; }
  @media (min-width: 480px) {
    body { margin: 40px auto; }
    button { width: auto; margin-right: 8px; }
  }
</style>
</head>
<body>
  <h1>ORYN — Withdraw Savings</h1>
  <p class="sub">Owner-only. Pulls funds out of your vault's savings balance to any address you choose.</p>

  <div class="row">
    <label>Vault address</label>
    <input id="vaultInput" value="0xc3c92EA811e5fF318E0D12384CdeD13BD3aEee0E" />
  </div>

  <button id="checkBtn" type="button" class="secondary">Check savings balance</button>
  <div class="balance-box" id="balanceBox" style="display:none">
    Available to withdraw
    <strong id="balanceAmount">—</strong>
  </div>

  <div class="row">
    <label>Amount to withdraw (cUSD)</label>
    <input id="amountInput" value="" placeholder="e.g. 0.01" />
  </div>
  <div class="row">
    <label>Send to (defaults to your connected wallet once connected)</label>
    <input id="toInput" value="" placeholder="0x..." />
  </div>

  <button id="connectBtn">1. Connect Wallet</button>
  <button id="sendBtn" disabled>2. Send Transaction</button>

  <div id="status"></div>

  <script>
    const CELO_CHAIN_ID_HEX = "0xa4ec"; // 42220
    const SELECTOR_WITHDRAW = "00f714ce"; // withdraw(uint256,address) — verified via viem
    const SELECTOR_SAVINGS_BALANCE = "ad787096"; // savingsBalance() — verified via viem
    const TOKEN_DECIMALS = 18; // cUSD / USDm

    const vaultInput = document.getElementById("vaultInput");
    const amountInput = document.getElementById("amountInput");
    const toInput = document.getElementById("toInput");
    const statusEl = document.getElementById("status");
    const connectBtn = document.getElementById("connectBtn");
    const sendBtn = document.getElementById("sendBtn");
    const checkBtn = document.getElementById("checkBtn");
    const balanceBox = document.getElementById("balanceBox");
    const balanceAmount = document.getElementById("balanceAmount");

    let account = null;

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = cls || "";
    }

    function padHex(hex, bytes) {
      return hex.replace(/^0x/, "").padStart(bytes * 2, "0");
    }

    function encodeAddress(addr) {
      return padHex(addr, 32);
    }

    function encodeUint256(bigintValue) {
      return padHex(bigintValue.toString(16), 32);
    }

    function parseUnitsDecimal(value, decimals) {
      const [whole, frac = ""] = value.trim().split(".");
      const fracPadded = (frac + "0".repeat(decimals)).slice(0, decimals);
      const wholeDigits = whole === "" ? "0" : whole;
      return BigInt(wholeDigits + fracPadded);
    }

    function formatUnitsDecimal(bigintValue, decimals) {
      const s = bigintValue.toString().padStart(decimals + 1, "0");
      const whole = s.slice(0, -decimals) || "0";
      const frac = s.slice(-decimals).replace(/0+$/, "");
      return frac ? `${whole}.${frac}` : whole;
    }

    checkBtn.addEventListener("click", async () => {
      if (!window.ethereum) {
        setStatus("No wallet found. Install MetaMask and reload.", "err");
        return;
      }
      try {
        const data = "0x" + SELECTOR_SAVINGS_BALANCE;
        const result = await window.ethereum.request({
          method: "eth_call",
          params: [{ to: vaultInput.value, data }, "latest"],
        });
        const value = BigInt(result);
        balanceAmount.textContent = formatUnitsDecimal(value, TOKEN_DECIMALS) + " cUSD";
        balanceBox.style.display = "block";
        setStatus("");
      } catch (err) {
        setStatus("Failed to read balance: " + (err && err.message ? err.message : err), "err");
      }
    });

    connectBtn.addEventListener("click", async () => {
      if (!window.ethereum) {
        setStatus("No wallet found. Install MetaMask (or open this page in a wallet browser) and reload.", "err");
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0];
        if (!toInput.value) toInput.value = account;

        const chainId = await window.ethereum.request({ method: "eth_chainId" });
        if (chainId !== CELO_CHAIN_ID_HEX) {
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: CELO_CHAIN_ID_HEX }],
            });
          } catch (switchErr) {
            if (switchErr.code === 4902) {
              await window.ethereum.request({
                method: "wallet_addEthereumChain",
                params: [{
                  chainId: CELO_CHAIN_ID_HEX,
                  chainName: "Celo Mainnet",
                  nativeCurrency: { name: "CELO", symbol: "CELO", decimals: 18 },
                  rpcUrls: ["https://forno.celo.org"],
                  blockExplorerUrls: ["https://celoscan.io"],
                }],
              });
            } else {
              throw switchErr;
            }
          }
        }

        setStatus(`Connected: ${account}\nMake sure this matches the vault owner — only the owner can withdraw.`, "ok");
        sendBtn.disabled = false;
      } catch (err) {
        setStatus("Connect failed: " + (err && err.message ? err.message : err), "err");
      }
    });

    sendBtn.addEventListener("click", async () => {
      if (!account) return;
      try {
        const amount = parseUnitsDecimal(amountInput.value, TOKEN_DECIMALS);
        const to = toInput.value || account;
        const data = "0x" + SELECTOR_WITHDRAW + encodeUint256(amount) + encodeAddress(to);
        setStatus("Sending — check your wallet for the confirmation prompt...");
        const txHash = await window.ethereum.request({
          method: "eth_sendTransaction",
          params: [{ from: account, to: vaultInput.value, data, value: "0x0" }],
        });
        setStatus("Sent! Tx hash: " + txHash + "\n\nView on Celoscan: https://celoscan.io/tx/" + txHash, "ok");
      } catch (err) {
        setStatus("Transaction failed or was rejected: " + (err && err.message ? err.message : err), "err");
      }
    });
  </script>
</body>
</html>
